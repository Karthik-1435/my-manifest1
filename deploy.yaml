---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mydeploy
  labels:
    app: swiggy

spec:
  replicas: 2

  selector:
    matchLabels:
      app: swiggy

  template:
    metadata:
      labels:
        app: swiggy

    spec:
      containers:
          - name: mycont1
            image: karthik621/clicking
            ports:
              - containerPort: 80
